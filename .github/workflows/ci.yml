name: CI — DBDE AI Assistant

on:
  push:
    branches: [main, main-v7.3.0, "codex/*"]
  pull_request:
    branches: [main]

env:
  EVAL_MOCK_LLM: "true"
  PYTHONPATH: "."

jobs:
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc on 2>&1 || true

      - name: Run tests
        run: python -m pytest tests/ -x --tb=short -q

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high 2>&1 || true

      - name: Build frontend
        run: npm run build

      - name: Verify build output
        run: |
          test -f static/index.html
          test -d static/dist/assets
          echo "Frontend build OK"
